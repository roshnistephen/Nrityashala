        - heading "A Life Devoted to Dance" [level=2] [ref=e51]
        - generic [ref=e53]: ✦
        - paragraph [ref=e54]: "\"An artist whose journey reflects an unwavering dedication to tradition, discipline, and creative excellence.\""
        - paragraph [ref=e55]: Mrs. Preeti Mohapatra, an accomplished Odissi exponent, is a distinguished disciple of both Padma Vibhushan Guru Kelucharan Mohapatra and Guru Shri Naba Kishore Mishra. A recipient of the National Scholarship for both Odissi and Chhau, she embodies the true essence of India's classical dance heritage.
        - generic [ref=e56]:
          - generic [ref=e57]: ✦ National Scholarship – Odissi Dance
          - generic [ref=e58]: ✦ National Scholarship – Chhau Dance
          - generic [ref=e59]: ✦ Sangit Prabhakar, Prayag Sangit Samiti
          - generic [ref=e60]: ✦ Graded Artist, Doordarshan Bhubaneswar
          - generic [ref=e61]: ✦ 40+ years of artistic journey
          - generic [ref=e62]: ✦ 25+ years as dedicated Odissi Guru
        - generic:
          - paragraph [ref=e63]: Over a 40-year artistic journey, including 25 years as a dedicated Odissi guru, she has carved a niche as both a performer of exceptional grace and a teacher of rare depth. A Sangit Prabhakar from Prayag Sangit Samiti Prayagraj, Mrs. Mohapatra has presented her art at prestigious cultural platforms across India.
          - generic [ref=e64]:
            - heading "Prestigious Performances & Festivals" [level=4] [ref=e65]
            - list [ref=e66]:
              - listitem [ref=e67]: — Konark Festival
              - listitem [ref=e68]: — Puri Beach Festival
              - listitem [ref=e69]: — India International Trade Fair, Pragati Maidan
              - listitem [ref=e70]: — International Odissi Dance Festival, Bhubaneswar
              - listitem [ref=e71]: — Naba Kruti, Bhubaneswar
              - listitem [ref=e72]: — Natyanjali Festival, Chidambaram
          - paragraph [ref=e73]: Smt. Preeti Mohapatra is also a graded artist of Doordarshan, Bhubaneswar, a distinction accorded to artists of exceptional calibre and contribution to classical arts.
          - paragraph [ref=e74]: For the past 15 years, she has been nurturing the next generation of Odissi dancers at Nrityashala, a renowned Hyderabad-based institution dedicated to authentic classical Odissi training. Her teaching philosophy is rooted in the Guru-Shishya parampara — the sacred tradition of knowledge passed from master to disciple.
          - paragraph [ref=e75]:
            - text: In recognition of her creative contributions and her steadfast efforts to preserve and promote the Odissi tradition, Preeti Mohapatra was recently honoured with the prestigious
            - strong [ref=e76]: "\"Natya Thoranam\""
            - text: award by the Amrita Cultural Trust, Hyderabad.
