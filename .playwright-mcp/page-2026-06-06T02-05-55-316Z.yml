        - generic [ref=e84]: ✦
        - paragraph [ref=e85]: Mrs. Preeti Mohapatra, an accomplished Odissi exponent, stands among the disciples of the legendary Padma Vibhushan Guru Sri Kelucharan Mohapatra and Guru Sri Naba Kishore Mishra. A recipient of the National Scholarship for both Odissi and Chhau, she embodies the true essence of India's classical dance heritage.
        - paragraph [ref=e86]: Over a 40-year artistic journey, including 25 years as a dedicated Odissi guru, she has carved a niche as both a performer of exceptional grace and a teacher of rare depth. A graded artist of Doordarshan, Bhubaneswar, she has performed at prestigious stages across India.
