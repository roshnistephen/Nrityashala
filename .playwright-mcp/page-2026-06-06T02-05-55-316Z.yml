  - region "The Grace of Odissi" [ref=e64]:
    - generic [ref=e66]:
      - generic [ref=e67]: The Art Form
      - heading "The Grace of Odissi" [level=2] [ref=e68]
      - generic [ref=e70]: ✦
      - paragraph [ref=e71]:
        - text: Odissi is one of the oldest surviving dance forms of India, originating from the sacred temples of Odisha. Distinguished by its lyrical grace, sensuous movements, and deeply spiritual expression, Odissi is built upon the
        - emphasis [ref=e72]: tribhangi
        - text: — the three-point deflection of the body representing the divine beauty of Lord Jagannath.
      - paragraph [ref=e73]: Every gesture, every glance, every footstep in Odissi is a prayer — a conversation between the dancer and the divine. It is an art that transcends performance and becomes a meditative offering.
