        - generic [ref=e40]: ✦
        - paragraph [ref=e41]: Nrityashala is a revered institution dedicated to the authentic transmission of Odissi—one of India's oldest and most exquisite classical dance forms. Rooted in the temple traditions of Odisha, Odissi carries within it centuries of devotion, grace, and artistic mastery.
        - paragraph [ref=e42]: Under the expert guidance of Smt. Preeti Mohapatra, students embark on a transformative journey into the world of classical dance—learning not just technique, but the philosophy, spirituality, and cultural heritage that breathe life into every movement.
        - generic [ref=e43]:
          - heading "Our Values" [level=3] [ref=e44]
          - paragraph [ref=e45]: At Nrityashala, we value artistic excellence, cultural preservation, discipline, and holistic growth. We foster a deep connection between tradition and personal expression, helping students grow both as dancers and individuals.
